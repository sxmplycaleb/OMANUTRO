<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | L&C Enterprise</title>
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="/"><span class="brand-mark">L&C</span><span>L&C Admin</span></a>
    <div>
      <h1>Admin Login</h1>
      <p class="muted">Manage the L&C Enterprise catalog, orders, and revenue desk.</p>
    </div>
    <form id="loginForm" class="form-stack">
      <label>Email<input id="email" type="email" autocomplete="email" value="admin@demo.com" required></label>
      <label>Password<input id="password" type="password" autocomplete="current-password" value="Admin123!" required></label>
      <button class="primary-button" type="submit">Sign In</button>
    </form>
    <p class="error-message" id="loginError" role="alert"></p>
  </main>
  <script src="/admin/admin.js"></script>
</body>
</html>
