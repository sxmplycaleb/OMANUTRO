<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | OMANUTRO</title>
  <link rel="icon" href="https://3z8qdlgzk1.ufs.sh/f/ryTwMvEKto8yWUEcNazPVjgpf1LJ95aFliKEU3kwNuBomy2G">
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="/"><span class="brand-mark"><img src="https://3z8qdlgzk1.ufs.sh/f/ryTwMvEKto8yWUEcNazPVjgpf1LJ95aFliKEU3kwNuBomy2G" alt=""></span><span>OMANUTRO Admin</span></a>
    <div>
      <h1>Admin Login</h1>
      <p class="muted">Manage the OMANUTRO catalog, drops, orders, and revenue desk.</p>
    </div>
    <form id="loginForm" class="form-stack">
      <label>Email<input id="email" type="email" autocomplete="email" required placeholder="admin@example.com"></label>
      <label>Password<input id="password" type="password" autocomplete="current-password" required placeholder="Enter your password"></label>
      <button class="primary-button" type="submit">Sign In</button>
    </form>
    <p class="error-message" id="loginError" role="alert"></p>
  </main>
  <script src="/scripts/shared/form-validation.js"></script>
  <script src="/admin/admin.js"></script>
</body>
</html>
