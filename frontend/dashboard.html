<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | OMANUTRO</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/pages/role-dashboard.css">
</head>
<body class="role-dashboard-page">
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <main class="role-dashboard-shell" id="roleDashboard">
    <aside class="role-sidebar" id="dashboardSidebar" aria-label="Dashboard navigation">
      <div class="role-sidebar-head">
        <a class="role-brand" href="/">OMANUTRO</a>
        <button class="role-icon-button" id="sidebarToggle" type="button" aria-label="Collapse sidebar" aria-expanded="true">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
      <div class="role-user-card" id="sidebarUser"></div>
      <nav class="role-nav" id="roleNav"></nav>
    </aside>

    <section class="role-main">
      <header class="role-topbar">
        <button class="role-icon-button mobile-sidebar-button" id="mobileSidebarToggle" type="button" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="role-search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m20 20-4.5-4.5"/><circle cx="11" cy="11" r="6.5"/></svg>
          <input id="dashboardSearch" type="search" placeholder="Search dashboard" aria-label="Search dashboard">
        </div>
        <button class="role-icon-button" type="button" aria-label="Notifications">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 9a6 6 0 1 0-12 0c0 7-2.5 7-2.5 9h17c0-2-2.5-2-2.5-9Z"/><path d="M10 21h4"/></svg>
          <span class="notification-dot" aria-hidden="true"></span>
        </button>
        <button class="role-profile-button" id="topProfileButton" type="button" aria-haspopup="true" aria-expanded="false"></button>
        <div class="role-profile-menu hidden" id="topProfileMenu">
          <div id="topProfileSummary"></div>
          <a href="/account.html">Profile</a>
          <a href="/account.html#security">Settings</a>
          <button type="button" id="dashboardLogout">Logout</button>
        </div>
      </header>

      <section class="role-content">
        <nav class="breadcrumbs" aria-label="Breadcrumb">
          <a href="/">Home</a>
          <span>/</span>
          <span id="breadcrumbRole">Dashboard</span>
        </nav>
        <section id="dashboardBody" aria-live="polite"></section>
      </section>
    </section>
  </main>

  <script src="/scripts/core/api.js"></script>
  <script src="/scripts/core/auth.js"></script>
  <script src="/scripts/features/account/role-dashboard.js"></script>
  <script type="module" src="/scripts/integrations/firebase-auth.mjs"></script>
</body>
</html>
